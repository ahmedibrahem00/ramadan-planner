<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>منظّم رمضان اليومي</title>
  <style>
:root {
  --bg-main: #f8f6f2;        
  --bg-soft: #f1e7d8;       
  --card-bg: #ffffff;        
  --border: #e3d8c7;

  --primary: #b08968;        
  --primary-soft: #b0896833;

  --accent: #7f5539;         
  --gold: #c6a75e;

  --text-main: #3e3e3e;
  --text-muted: #8a817c;

  --shadow: 0 8px 25px rgba(120, 95, 70, 0.12);
}

* {
  box-sizing: border-box;
  font-family: "Cairo", system-ui, -apple-system, Segoe UI, Roboto, Arial;
}

body {
  margin: 0;
  background: linear-gradient(160deg, var(--bg-main), #ede3d4);
  color: var(--text-main);
  min-height: 100vh;
  text-align: center;
}
        /* Scroll داخلي لمنطقة الأرشيف */

.card:has(#toggleArchive) {
  max-height: 420px;
  overflow-y: auto;
  padding-right: 6px;
}

/* شكل السكرول هادي */
.card:has(#toggleArchive)::-webkit-scrollbar {
  width: 6px;
}

.card:has(#toggleArchive)::-webkit-scrollbar-thumb {
  background: #d6c2ad;
  border-radius: 10px;
}

/* ===== Header ===== */
header {
  padding: 30px 16px;
  text-align: center;
  background: var(--bg-soft);
  border-bottom: 1px solid var(--border);
}

header h1 {
  margin: 0 0 10px;
  font-size: 30px;
  font-weight: 700;
  color: var(--accent);
}

header p {
  margin: 0;
  color: var(--text-muted);
  font-size: 15px;
}

/* ===== Layout ===== */
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px;
  display: grid;
  gap: 20px;
}

/* ===== Cards ===== */
.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 20px;
  box-shadow: var(--shadow);
  transition: .3s ease;
}

.card:hover {
  border-color: var(--primary-soft);
}

.card h2 {
  margin-top: 0;
  margin-bottom: 15px;
  font-size: 20px;
  color: var(--primary);
}

/* ===== Grid ===== */
.grid {
  display: grid;
  gap: 14px;
}

.grid-2 {
  grid-template-columns: 1fr 1fr;
}

@media (max-width: 768px) {
  .grid-2 {
    grid-template-columns: 1fr;
  }
}

/* ===== Checklist ===== */
.checklist label {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-radius: 12px;
  background: var(--bg-soft);
  cursor: pointer;
  transition: .25s ease;
  border: 1px solid transparent;
}

.checklist label:hover {
  border-color: var(--primary-soft);
  background: #f5eee3;
}

.checklist input {
  width: 18px;
  height: 18px;
  accent-color: var(--primary);
}

/* ===== Buttons ===== */
.btn {
  border: none;
  border-radius: 14px;
  padding: 12px 16px;
  background: linear-gradient(135deg, #b08968, #a47148);
  color: #ffffff;
  font-weight: 700;
  cursor: pointer;
  transition: .3s ease;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(160,120,80,.25);
}

.btn.secondary {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--accent);
}

.btn.secondary:hover {
  border-color: var(--primary);
  color: var(--primary);
}

/* ===== Archive Grid ===== */
.archive-grid {
  display: grid;
  gap: 16px;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  margin-top: 15px;
}

.archive-item {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 15px;
  transition: .3s ease;
}

.archive-item:hover {
  transform: translateY(-4px);
  border-color: var(--primary-soft);
}

/* ===== Archive Toggle Animation ===== */
.archive-wrapper {
  overflow: hidden;
  max-height: 0;
  transition: max-height .5s ease;
}

.archive-wrapper.open {
  max-height: 2000px;
}

/* ===== Rating Box ===== */
.rating-box {
  margin-top: 15px;
  font-size: 17px;
  color: var(--gold);
  font-weight: 600;
}

/* ===== Summary ===== */
#summary div {
  background: var(--bg-soft);
  padding: 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
}

/* ===== Footer ===== */
footer {
  text-align: center;
  color: var(--text-muted);
  padding: 25px 12px;
  border-top: 1px solid var(--border);
  margin-top: 30px;
  font-size: 14px;
}

/* ===== Small Badge ===== */
.badge {
  color: var(--primary);
  font-weight: 600;
  margin-top: 5px;
  display: inline-block;
}

    /* تحسين المسافات */

.actions {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.checklist {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.card .card {
  margin-top: 10px;
}

.card h3 {
  margin-bottom: 10px;
}
  </style>
</head>
<body>

<header>
  <h1>منظّم رمضان اليومي 🌙</h1>
  <p>نظّم صلاتك ووردك وذكرك يوم بيوم لحد آخر رمضان</p>
</header>

<main class="container">
  <section class="card">
    <h2>📅 يومك النهارده</h2>
    <div id="todayDate" class="badge"></div>

    <div class="grid grid-2" style="margin-top:12px">
      <div class="card">
        <h3>🕌 الصلوات</h3>
        <div class="checklist">
          <label><input type="checkbox" data-key="fajr"> الفجر</label>
          <label><input type="checkbox" data-key="dhuhr"> الظهر</label>
          <label><input type="checkbox" data-key="asr"> العصر</label>
          <label><input type="checkbox" data-key="maghrib"> المغرب</label>
          <label><input type="checkbox" data-key="isha"> العشاء</label>
        </div>
      </div>

      <div class="card">
        <h3>📖 القرآن</h3>
        <div class="checklist">
          <label><input type="checkbox" data-key="wird"> ورد اليوم اتقري</label>
        </div>
        <h3 style="margin-top:10px">🤲 الأذكار</h3>
        <div class="checklist">
          <label><input type="checkbox" data-key="morning"> أذكار الصباح</label>
          <label><input type="checkbox" data-key="evening"> أذكار المساء</label>
          <label><input type="checkbox" data-key="salawat"> صلاة على النبي</label>
        </div>
      </div>
    </div>

    <div class="rating-box">
      ⭐ تقييمك اليوم: <span id="autoRating">0 / 5</span>
    </div>

    <div class="actions" style="margin-top:12px">
      <button class="btn" id="finishDay">✅ إنهاء اليوم وحفظه في الأرشيف</button>
      <button class="btn secondary" id="resetToday">♻️ تصفير اليوم</button>
    </div>
  </section>

<section class="card">
  <h2>📂 الأرشيف</h2>

  <button class="btn secondary" id="toggleArchive">
    📂 عرض الأرشيف
  </button>

  <div class="archive-wrapper" id="archiveWrapper">
    <div id="archiveList" class="archive-grid"></div>
  </div>
</section>

<section class="card">
  <h2>🗑 سلة المحذوفات</h2>

  <button class="btn secondary" id="toggleTrash">
    🗑 عرض المحذوفات
  </button>

  <div class="archive-wrapper" id="trashWrapper">
    <div id="trashList" class="archive-grid"></div>
  </div>
</section>

  <section class="card">
    <h2>📊 ملخص رمضان</h2>
    <div id="summary" class="grid"></div>
  </section>
</main>

<footer>
  ربنا يتقبل منكم ويعينكم على الطاعة اخوكم احمد ابراهيم 🤍
</footer>

<script>
  const todayKey = () => new Date().toISOString().slice(0,10);
  const getStore = () => JSON.parse(localStorage.getItem('ramadan-tracker') || '{"archive":{}}');
  const setStore = (data) => localStorage.setItem('ramadan-tracker', JSON.stringify(data));

  const todayDateEl = document.getElementById('todayDate');
  const archiveList = document.getElementById('archiveList');
  const summaryEl = document.getElementById('summary');
  const autoRatingEl = document.getElementById('autoRating');

  const allKeys = ['fajr','dhuhr','asr','maghrib','isha','wird','morning','evening','salawat'];

  function formatDate(dStr){
    const d = new Date(dStr);
    return d.toLocaleDateString('ar-EG', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  }

  function calculateRating(data){
    const done = allKeys.filter(k => data[k]).length;
    return Math.round((done / allKeys.length) * 5);
  }

  function recalculateOldRatings() {
  const store = getStore();
  if (!store.archive) return;

  Object.keys(store.archive).forEach(date => {
    const dayData = store.archive[date];
    dayData.rating = calculateRating(dayData);
  });

  setStore(store);
}

  function updateAutoRating(){
    const store = getStore();
    const today = store[todayKey()] || {};
    const rating = calculateRating(today);
    autoRatingEl.textContent = rating + " / 5";
    return rating;
  }

  function loadToday(){
    todayDateEl.textContent = formatDate(todayKey());
    const store = getStore();
    const today = store[todayKey()] || {};
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      cb.checked = !!today[cb.dataset.key];
    });
    updateAutoRating();
  }

  document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', () => {
      const store = getStore();
      store[todayKey()] = store[todayKey()] || {};
      store[todayKey()][cb.dataset.key] = cb.checked;
      store[todayKey()].rating = calculateRating(store[todayKey()]);
      setStore(store);
      updateAutoRating();
    });
  });

  document.getElementById('finishDay').onclick = () => {
    const store = getStore();
    const todayData = store[todayKey()] || {};
    store.archive = store.archive || {};
    store.archive[todayKey()] = { ...todayData, date: todayKey() };
    delete store[todayKey()];
    setStore(store);
    loadArchive();
    resetToday();
    alert('اتحفظ يومك في الأرشيف');
  };

  document.getElementById('resetToday').onclick = resetToday;

  function resetToday(){
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
    const store = getStore();
    delete store[todayKey()];
    setStore(store);
    updateAutoRating();
  }

  function loadArchive(){
    const store = getStore();
    const items = Object.values(store.archive || {}).sort((a,b)=> b.date.localeCompare(a.date));
    archiveList.innerHTML = items.map(d => {
    const prayers = ['fajr','dhuhr','asr','maghrib','isha'].filter(k => d[k]).length;

  return `
    <div class="archive-item">
      <div><strong>📅 ${formatDate(d.date)}</strong></div>
      <div>🕌 الصلوات: ${prayers}/5</div>
      <div>📖 القرآن: ${d.wird ? 'تم' : '—'}</div>
      <div>🤲 الأذكار: ${['morning','evening','salawat'].filter(k=>d[k]).length}/3</div>
      <div>⭐ التقييم: ${d.rating || 0} / 5</div>

      <button class="btn secondary delete-day" data-date="${d.date}">
        🗑 حذف اليوم
      </button>
    </div>
  `;
}).join('') || '<p style="color:#9ca3af">لسه مفيش أيام محفوظة.</p>';

    loadSummary(items);
  }

  const archiveWrapper = document.getElementById("archiveWrapper");
const toggleBtn = document.getElementById("toggleArchive");

toggleBtn.addEventListener("click", () => {
  archiveWrapper.classList.toggle("open");

  if (archiveWrapper.classList.contains("open")) {
    toggleBtn.textContent = "❌ إخفاء الأرشيف";
  } else {
    toggleBtn.textContent = "📂 عرض الأرشيف";
  }
});

  function loadSummary(items){
    if(!items.length){
      summaryEl.innerHTML = '<p style="color:#9ca3af">ابدأ أول يوم وهتشوف الملخص هنا </p>';
      return;
    }

    const fullDays = items.filter(d => allKeys.every(k => d[k])).length;
    const avgRating = (items.reduce((s,d)=> s + (d.rating||0), 0) / items.length).toFixed(1);

    const names = {
      fajr:'الفجر', dhuhr:'الظهر', asr:'العصر', maghrib:'المغرب', isha:'العشاء',
      wird:'ورد القرآن', morning:'أذكار الصباح', evening:'أذكار المساء', salawat:'الصلاة على النبي'
    };

    const missedAll = allKeys.filter(k => items.some(d => !d[k]));

    summaryEl.innerHTML = `
      <div>عدد الأيام الملتزم فيها بالكامل: <strong>${fullDays}</strong></div>
      <div>متوسط تقييم الأيام: <strong>${avgRating} ⭐</strong></div>
      <div>أكتر حاجات محتاجة تزبيط:
        <strong>
          ${
            missedAll.length
              ? missedAll.map(k => names[k]).join(' ، ') + ' — حاول تلتزم 💪'
              : 'مش محتاج ما شاء الله عليك 👏'
          }
        </strong>
      </div>
    `;
  }

  document.addEventListener("click", function(e){

  if(e.target.classList.contains("delete-day")){
    const date = e.target.dataset.date;
    const store = getStore();

    store.trash = store.trash || {};
    store.trash[date] = store.archive[date];

    delete store.archive[date];
    setStore(store);

    loadArchive();
    loadTrash();
  }

  if(e.target.classList.contains("restore-day")){
    const date = e.target.dataset.date;
    const store = getStore();

    store.archive[date] = store.trash[date];
    delete store.trash[date];

    setStore(store);
    loadArchive();
    loadTrash();
  }

  if(e.target.classList.contains("delete-forever")){
    const date = e.target.dataset.date;
    const store = getStore();

    delete store.trash[date];
    setStore(store);

    loadTrash();
  }

});

function loadTrash(){
  const store = getStore();
  const trash = Object.values(store.trash || {});

  const trashList = document.getElementById("trashList");

  trashList.innerHTML = trash.map(d => {
    return `
      <div class="archive-item">
        <div><strong>📅 ${formatDate(d.date)}</strong></div>

        <button class="btn restore-day" data-date="${d.date}">
          ♻️ استرجاع
        </button>

        <button class="btn secondary delete-forever" data-date="${d.date}">
          ❌ حذف نهائي
        </button>
      </div>
    `;
  }).join('') || '<p style="color:#9ca3af">السلة فاضية </p>';
}

const trashWrapper = document.getElementById("trashWrapper");
const toggleTrashBtn = document.getElementById("toggleTrash");

toggleTrashBtn.addEventListener("click", () => {
  trashWrapper.classList.toggle("open");

  if (trashWrapper.classList.contains("open")) {
    toggleTrashBtn.textContent = "❌ إخفاء المحذوفات";
  } else {
    toggleTrashBtn.textContent = "🗑 عرض المحذوفات";
  }
});

recalculateOldRatings();
loadToday();
loadArchive();
loadTrash();
</script>

</body>
</html>
